  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    /* ── Header Bar ── */
    .header {
      background: #1a1a2e;
      color: white;
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .header-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.3px;
      white-space: nowrap;
      margin-right: 36px;
      color: #e0e6ff;
    }

    .header-title span {
      color: #4fc3f7;
    }

    /* ── Tab Navigation ── */
    .tab-nav {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 100%;
    }

    .tab-btn {
      background: transparent;
      color: #aaa;
      border: none;
      border-bottom: 3px solid transparent;
      height: 60px;
      padding: 0 18px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    .tab-btn:hover {
      color: #ddd;
    }

    .tab-btn.active {
      color: white;
      border-bottom-color: #4fc3f7;
    }

    /* ── Main Content Wrapper ── */
    .content-wrapper {
      padding: 24px;
      margin: 0 auto;
    }

    /* ── Placeholder Cards ── */
    .placeholder-card {
      background: white;
      border-radius: 8px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .placeholder-icon {
      font-size: 48px;
      opacity: 0.4;
    }

    .placeholder-title {
      font-size: 20px;
      font-weight: 600;
      color: #555;
    }

    .placeholder-badge {
      background: #e3f2fd;
      color: #1565c0;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.4px;
    }

    /* ── Tab 3: DAG 詳細 Layout ── */
    .dag-detail-layout {
      display: flex;
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
      min-height: calc(100vh - 132px);
    }

    /* Left Panel */
    .dag-list-panel {
      width: 280px;
      flex-shrink: 0;
      background: #f5f5f5;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
    }

    .dag-list-header {
      padding: 16px;
      border-bottom: 1px solid #ddd;
      background: #f5f5f5;
    }

    .dag-list-header h3 {
      margin: 0 0 10px 0;
      font-size: 13px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .dag-search-input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      background: white;
      outline: none;
      transition: border-color 0.2s;
    }

    .dag-search-input:focus {
      border-color: #4fc3f7;
    }

    .dag-list-count {
      margin-top: 8px;
      font-size: 11px;
      color: #999;
    }

    .dag-list-scroll {
      overflow-y: auto;
      flex: 1;
    }

    .dag-list-item {
      padding: 12px 16px;
      cursor: pointer;
      font-size: 13px;
      color: #444;
      border-bottom: 1px solid #ebebeb;
      transition: background 0.15s;
      font-family: "SF Mono", "Consolas", monospace;
      word-break: break-all;
    }

    .dag-list-item:hover {
      background: #e3f2fd;
    }

    .dag-list-item.selected {
      background: #bbdefb;
      color: #0d47a1;
      font-weight: 600;
    }

    .dag-list-empty {
      padding: 24px 16px;
      font-size: 13px;
      color: #aaa;
      text-align: center;
    }

    /* Right Panel — first definition removed, consolidated below */

    .dag-detail-empty {
      text-align: center;
      color: #bbb;
    }

    .dag-detail-empty-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .dag-detail-empty-text {
      font-size: 16px;
      font-weight: 500;
    }

    .dag-detail-empty-sub {
      font-size: 13px;
      margin-top: 6px;
      color: #ccc;
    }

    /* ── Scrollbar Styling ── */
    .dag-list-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .dag-list-scroll::-webkit-scrollbar-track {
      background: #f0f0f0;
    }
    .dag-list-scroll::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 3px;
    }
    .dag-list-scroll::-webkit-scrollbar-thumb:hover {
      background: #aaa;
    }

    /* ── Tab 1: Overview Mermaid Chart ── */
    .overview-card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .overview-card-header {
      padding: 16px 24px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .overview-card-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin: 0;
    }

    .overview-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px 24px;
      border-bottom: 1px solid #f0f0f0;
      background: #fafafa;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #555;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .mermaid-container {
      overflow: auto;
      padding: 24px;
      min-height: 400px;
    }

    .mermaid-container svg {
      display: block;
      margin: 0 auto;
    }

    .mermaid-error {
      padding: 24px;
      color: #c62828;
      font-size: 13px;
      font-family: monospace;
      background: #fff8f8;
      border: 1px solid #ffcdd2;
      border-radius: 4px;
      white-space: pre-wrap;
    }

    /* ── Tab 3: DAG Detail Right Panel ── */
    .dag-detail-content {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 28px 32px;
      align-self: flex-start;
    }

    .dag-detail-panel {
      flex: 1;
      display: flex;
      align-items: flex-start;
      padding: 0;
      background: white;
      overflow-y: auto;
      min-height: 0;
    }

    .dag-detail-header {
      margin-bottom: 4px;
    }

    .dag-detail-title {
      font-size: 20px;
      font-weight: 700;
      font-family: "SF Mono", "Consolas", monospace;
      color: #1a1a2e;
      margin: 0 0 6px 0;
    }

    .dag-detail-summary {
      font-size: 14px;
      color: #555;
      margin: 0;
    }

    .dag-info-cards {
      display: flex;
      gap: 12px;
      margin: 16px 0;
      flex-wrap: wrap;
    }

    .dag-info-card {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 14px 16px;
      flex: 1;
      min-width: 120px;
    }

    .dag-info-card label {
      font-size: 11px;
      color: #888;
      display: block;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .dag-info-card .value {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    .dag-section {
      margin: 20px 0;
    }

    .dag-section h3 {
      font-size: 13px;
      color: #888;
      margin: 0 0 8px 0;
      border-bottom: 1px solid #eee;
      padding-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .dag-description {
      white-space: pre-wrap;
      line-height: 1.9;
      font-size: 14px;
      color: #444;
    }

    .dag-flow-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .dag-flow-label {
      background: #e3f2fd;
      padding: 7px 14px;
      border-radius: 4px;
      font-size: 13px;
      color: #1565c0;
    }

    .dag-flow-arrow {
      font-size: 18px;
      color: #aaa;
    }

    .pbi-impact {
      background: #fff3e0;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      color: #e65100;
    }

    .dag-mermaid-wrap {
      overflow-x: auto;
      background: #fafafa;
      border-radius: 8px;
      padding: 16px;
      border: 1px solid #eee;
    }

    .dag-detail-empty-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      min-height: 400px;
    }
  </style>

      const handleSearch = React.useCallback((text) => {
        setSearchText(text);

        if (!cy || !text.trim()) {
          setSearchResults([]);
          if (cy) cy.elements().removeClass('highlighted highlighted-upstream highlighted-downstream dimmed');
          return;
        }
        const q = text.toLowerCase().replace(/[_\s]/g, '');
        const matched = cy.nodes().filter(n => {
          const label = (n.data('label') || '').toLowerCase().replace(/[_\s\n]/g, '');
          const id = (n.data('id') || '').toLowerCase().replace(/[_\s]/g, '');
          return label.includes(q) || id.includes(q);
        });
        setSearchResults(matched.map(n => ({ id: n.data('id'), label: n.data('label').replace(/\n/g, ' ') })));
      }, []);

      const focusNode = React.useCallback((nodeId) => {
        const cy = cyRef.current;
        if (!cy) return;
        const node = cy.getElementById(nodeId);
        if (!node || node.empty()) return;

        cy.elements().removeClass('highlighted highlighted-upstream highlighted-downstream dimmed');
        cy.elements().addClass('dimmed');

        // Highlight chain
        node.removeClass('dimmed').addClass('highlighted');
        node.predecessors().nodes().removeClass('dimmed').addClass('highlighted-upstream');
        node.predecessors().edges().removeClass('dimmed').addClass('highlighted-upstream');
        node.successors().nodes().removeClass('dimmed').addClass('highlighted-downstream');
        node.successors().edges().removeClass('dimmed').addClass('highlighted-downstream');

        // Animate camera to node

          maxZoom: 3,
          wheelSensitivity: 0.2,
        });

        cyRef.current = cy;

        // Click node → highlight entire upstream + downstream chain
        cy.on('tap', 'node', function(e) {
          const node = e.target;
          // Clear previous highlights
          cy.elements().removeClass('highlighted highlighted-upstream highlighted-downstream dimmed');

          // Dim everything first
          cy.elements().addClass('dimmed');

          // Find all upstream (predecessors) and downstream (successors)
          const upstream = node.predecessors();
          const downstream = node.successors();

          // Highlight the clicked node
          node.removeClass('dimmed').addClass('highlighted');

          // Highlight upstream chain (blue)
          upstream.nodes().removeClass('dimmed').addClass('highlighted-upstream');
          upstream.edges().removeClass('dimmed').addClass('highlighted-upstream');

          // Highlight downstream chain (orange)
          downstream.nodes().removeClass('dimmed').addClass('highlighted-downstream');
          downstream.edges().removeClass('dimmed').addClass('highlighted-downstream');
        });

        // Click background → clear all highlights
        cy.on('tap', function(e) {
          if (e.target === cy) {
            cy.elements().removeClass('highlighted highlighted-upstream highlighted-downstream dimmed');
          }
        });

        cy.on('mouseover', 'node', function() {
          containerRef.current.style.cursor = 'pointer';
        });
        cy.on('mouseout', 'node', function() {
          containerRef.current.style.cursor = 'default';
        });

        // Fit graph to viewport after layout
        cy.on('layoutstop', function() {
          cy.fit(cy.elements(), 40);
        });

        return () => { cy.destroy(); };

          <p style={{ margin: "0 0 12px", fontSize: 13, color: "#666" }}>{strategy}</p>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr>
                <th style={{ textAlign: "left", padding: "6px 8px", borderBottom: `2px solid ${color}` }}>表名</th>
                <th style={{ textAlign: "left", padding: "6px 8px", borderBottom: `2px solid ${color}` }}>說明</th>
              </tr>
            </thead>
            <tbody>
              {tables.map(t => (
                <tr key={t.table}>
                  <td style={{ padding: "6px 8px", borderBottom: "1px solid #eee", fontFamily: "monospace", fontSize: 12 }}>{t.table}</td>
                  <td style={{ padding: "6px 8px", borderBottom: "1px solid #eee" }}>{t.desc}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function EntityInsightTab() {
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
          <div className="overview-card">
            <div className="overview-card-header">
              <h2 className="overview-card-title">Entity Insight Migration 完整流程</h2>
            </div>
            <div className="overview-legend">
              <div className="legend-item"><div className="legend-dot" style={{ background: "#FFCDD2" }} /><span>Snapshot：全量刷新（4 表）</span></div>
              <div className="legend-item"><div className="legend-dot" style={{ background: "#FFF9C4" }} /><span>Rolling 90：滾動 90 天（13 表）</span></div>
              <div className="legend-item"><div className="legend-dot" style={{ background: "#C8E6C9" }} /><span>Daily：每日追加（11 表）</span></div>
            </div>
            <div className="mermaid-container">
              <MermaidChart chart={EI_FLOW_CHART} />
            </div>
          </div>

          <div style={{ display: "flex", gap: 16, fontSize: 14 }}>
            <div style={{ flex: 1, background: "#FFF3E0", borderRadius: 8, padding: 16, color: "#E65100" }}>
              <strong>⚠️ 非 Atomic</strong><br/>DELETE 和 INSERT 之間有 5-30 秒空窗期，期間 API 查詢可能拿到不完整資料
            </div>
            <div style={{ flex: 1, background: "#FCE4EC", borderRadius: 8, padding: 16, color: "#C62828" }}>
              <strong>⚠️ 產品 DB Write Endpoint</strong><br/>Savvy PG = myviewboard-product-orm-prod，寫錯資料會直接影響線上 Entity Insight Dashboard
            </div>
            <div style={{ flex: 1, background: "#E3F2FD", borderRadius: 8, padding: 16, color: "#1565C0" }}>
              <strong>排程資訊</strong><br/>每天 03:00 UTC｜28 張表循序執行｜Owner: Vance｜retries=1, delay=5min
            </div>
          </div>

          <div className="overview-card">
            <div className="overview-card-header">
              <h2 className="overview-card-title">28 張表明細</h2>
            </div>
            <div style={{ padding: 24 }}>
              <TableList title="🔴 Snapshot（全量刷新）" color="#B71C1C" bgColor="#FFF5F5" tables={EI_SNAPSHOT_TABLES} strategy="DELETE ALL → INSERT。API 查詢不帶日期條件的表。" />
              <TableList title="🟡 Rolling 90（滾動 90 天）" color="#F57F17" bgColor="#FFFDE7" tables={EI_ROLLING_TABLES} strategy="DELETE today + DELETE 90天前 → INSERT today。API 查詢帶日期範圍的表。" />
              <TableList title="🟢 Daily（每日追加）" color="#2E7D32" bgColor="#F1F8E9" tables={EI_DAILY_TABLES} strategy="DELETE today → INSERT today。冪等重跑。" />
            </div>
          </div>
        </div>
      );
    }

    // ── Tab content router ─────────────────────────────────────────────────
    function TabContent({ activeTab }) {
      switch (activeTab) {
        case "overview":
          return <OverviewTab />;

        case "schedule":
          return <ScheduleTab />;

        case "dag-detail":
          return <DagDetailTab />;

        case "powerbi":
          return <PowerBITab />;

        case "entity-insight":
          return <EntityInsightTab />;

        default:
          return null;
      }
    }

    // ── Root App ───────────────────────────────────────────────────────────
    function App() {
      const [activeTab, setActiveTab] = React.useState("overview");

      return (
        <>
          {/* Header */}
          <header className="header">
            <div className="header-title">
              Data Team <span>DAG</span> 架構總覽
            </div>
            <nav className="tab-nav">
              {TABS.map(tab => (
                <button
                  key={tab.id}
                  className={`tab-btn${activeTab === tab.id ? " active" : ""}`}
                  onClick={() => setActiveTab(tab.id)}
                >
                  {tab.label}
                </button>
              ))}
            </nav>
          </header>

          {/* Content */}
          <main className={activeTab === "dag-detail" ? "" : "content-wrapper"}>
            {activeTab !== "dag-detail" ? (
              <TabContent activeTab={activeTab} />
            ) : (
              <div style={{ padding: "24px", maxWidth: "1400px", margin: "0 auto" }}>
                <TabContent activeTab={activeTab} />
              </div>
            )}
          </main>
        </>
      );
    }

    // ── Mount ──────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
